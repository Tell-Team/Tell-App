<html>
  <head>
    <link rel="stylesheet" href="../style-secondo-ruolo.css" />
    <link rel="stylesheet" href="../istanze-elencate.css" />
  </head>
  <body>
    <button onclick="window.location.href = './login.html';">Logout</button>

    <br /><br />

    <div class="singola-riga">
      <button onclick="window.location.href = './acquisto.html';">
        Acquisto
      </button>
      <button onclick="window.location.href = './info.html';">Info</button>
      <span style="color: green">Spettacoli</span>
      <button
        class="ticketOnly"
        onclick="window.location.href = './prenotazioni.html';"
      >
        Prenotazioni
      </button>
      <button
        class="adminOnly"
        onclick="window.location.href = './teatro.html';"
      >
        Teatro
      </button>
      <button
        class="adminOnly"
        onclick="window.location.href = './account.html';"
      >
        Account
      </button>
    </div>

    <div class="singola-riga">
      <h2>Spettacoli</h2>
      <div style="display: flex; align-items: center; border: 1px solid #ccc; padding: 2px 5px; margin-left: 10px;">
        <input type="text" placeholder="Inserire titolo..." style="border: none; outline: none;">
        <button style="background: #3b82f6; color: white; border: none; cursor: pointer;">🔍</button>
      </div>

      <button
        class="ticketOnly"
        onclick="window.location.href = '../crea-modifica/crea-spettacolo.html';"
      >
        + Nuovo Spettacolo
      </button>
    </div>

    <div class="istanza">
      <h3>Zelmira</h3>
      <div class="singola-riga">
        <button
          style="margin-left: 5px"
          onclick="window.location.href = './eventi-spettacolo.html';"
        >
          Maggior info
        </button>
        <button
          class="ticketOnly"
          style="margin-left: 10px"
          onclick="window.location.href = '../crea-modifica/modifica-spettacolo.html'"
        >
          Modifica
        </button>
        <button
          class="ticketOnly"
          style="margin-left: 10px"
          onclick="window.location.href = '../crea-modifica/elimina-spettacolo.html'"
        >
          Elimina
        </button>
      </div>
    </div>
