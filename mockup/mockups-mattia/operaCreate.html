<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Nuova Opera - Teatro</title>
    <style>
        /* CSS MINIMALE E COERENTE */
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #444; margin-top: 25px; margin-bottom: 15px; }
        hr { border: 0; border-top: 1px solid #eee; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { resize: vertical; min-height: 150px; }
        .actions { text-align: right; margin-top: 30px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #28a745; color: white; margin-left: 10px; } /* Verde per Creazione */
        .btn-secondary { background-color: #6c757d; color: white; }
        /* Stili per la tabella Regie (ancora vuota) */
        .regia-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .regia-table th, .regia-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>Aggiungi Nuova Opera (Anagrafica Base)</h1>

        <form action="#" method="POST">
            
            <h2>Dati Anagrafici Opera</h2>
            <hr>

            <div class="form-group">
                <label for="titolo">Titolo Opera *</label>
                <input type="text" id="titolo" name="titolo" required placeholder="Es. La Traviata">
            </div>
            
            <div class="form-group">
                <label for="compositore">Compositore</label>
                <input type="text" id="compositore" name="compositore" placeholder="Es. Giuseppe Verdi">
            </div>
            
            <div class="form-group">
                <label for="genere">Genere *</label>
                <select id="genere" name="genere" required>
                    <option value="">Seleziona Genere</option>
                    <option value="melodramma">Melodramma</option>
                    <option value="buffa">Opera Buff
