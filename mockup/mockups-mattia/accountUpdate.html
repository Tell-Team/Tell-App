<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Account - Teatro</title>
    <style>
        /* CSS MINIMALE E FUNZIONALE */
        body { font-family: sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ccc; }
        h1, h2 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .actions { text-align: right; margin-top: 20px; }
        .btn { padding: 10px 15px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #007bff; color: white; margin-left: 10px; } /* Blu per Modifica */
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>Modifica Account: [Nome e Cognome Utente]</h1>

        <form action="#" method="POST">
            
            <h2>Anagrafica</h2>
            <div class="form-group">
                <label for="nome">Nome *</label>
                <input type="text" id="nome" name="nome" value="Mario" required> 
            </div>
            
            <div class="form-group">
                <label for="cognome">Cognome *</label>
                <input type="text" id="cognome" name="cognome" value="Rossi" required>
            </div>

            <hr>

            <h2>Accesso e Ruolo</h2>

             <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" value="mrossi" required>
            </div>

            <div class="form-group">
                <label for="password_change">Nuova Password</label>
                <input type="password" id="password_change" name="password_change" placeholder="Lascia vuoto per non modificare">
            </div>
            
            <div class="form-group">
                <label for="ruolo">Ruolo *</label>
                <select id="ruolo" name="ruolo" required>
                    <option value="cliente" selected>Cliente</option> <option value="amministratore">Amministratore</option>
                    <option value="biglietteria">Biglietteria</option>
                </select>
            </div>

            <div class="actions">
                <button type="button" class="btn btn-danger">Elimina Account</button> 
                <button type="button" class="btn btn-secondary">Annulla</button> 
                <button type="submit" class="btn btn-primary">Salva Modifiche</button> 
            </div>

        </form>
    </div>

</body>
</html>
