<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Opera - Teatro</title>
    <style>
        /* CSS MINIMALE E COERENTE (come 1A) */
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #444; margin-top: 25px; margin-bottom: 15px; }
        hr { border: 0; border-top: 1px solid #eee; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { resize: vertical; min-height: 150px; }
        .actions { text-align: right; margin-top: 30px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #007bff; color: white; margin-left: 10px; } /* Blu per Modifica */
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-add { background-color: #28a745; color: white; }
        .regia-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .regia-table th, .regia-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .regia-table th { background-color: #f8f9fa; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>Modifica Opera: [Titolo Opera Corrente]</h1>

        <form action="#" method="POST">
            
            <h2>Dati Anagrafici Opera</h2>
            <hr>

            <div class="form-group">
                <label for="titolo">Titolo Opera *</label>
                <input type="text" id="titolo" name="titolo" required value="La Traviata">
            </div>
            
            <div class="form-group">
                <label for="compositore">Compositore</label>
                <input type="text" id="compositore" name="compositore" value="Giuseppe Verdi">
            </div>
            
            <div class="form-group">
                <label for="genere">Genere *</label>
                <select id="genere" name="genere" required>
                    <option value="melodramma" selected>Melodramma</option>
                    <option value="buffa">Opera Buffa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="trama">Trama / Sinossi (Contenuto Pubblico)</label>
                <textarea id="trama" name="trama">Violetta, una cortigiana parigina... (Sinossi precompilata)</textarea>
            </div>

            <h2>Storico Regie (Produzioni)</h2>
            <hr>
            
            <button type="button" class="btn btn-add" style="float: right; margin-bottom: 10px;">+ Aggiungi Nuova Regia</button>

            <table class="regia-table">
                <thead>
                    <tr><th>Nome Regia</th><th>Regista</th><th>Stagione</th><th>Azioni</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Produzione Corrente 2024</td>
                        <td>Giulia Bianchi</td>
                        <td>2024/2025</td>
                        <td><a href="#modifica_regia">Modifica</a> | <a href="#elimina_regia">Elimina</a></td>
                    </tr>
                     <tr>
                        <td>Regia Storica 2018</td>
                        <td>Mario Rossi</td>
                        <td>2018/2019</td>
                        <td><a href="#modifica_regia">Modifica</a> | <a href="#elimina_regia">Elimina</a></td>
                    </tr>
                </tbody>
            </table>
            
            <div class="actions">
                <button type="button" class="btn btn-danger">Elimina Opera</button> 
                <button type="button" class="btn btn-secondary">Annulla</button> 
                <button type="submit" class="btn btn-primary">Salva Modifiche</button> 
            </div>

        </form>
    </div>

</body>
</html>
