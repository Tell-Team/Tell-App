<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Spettacolo - Teatro</title>
    <style>
        /* CSS MINIMALE E COERENTE */
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #444; margin-top: 25px; margin-bottom: 15px; }
        h3 { color: #555; margin-top: 20px; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #eee; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-row::after { content: ""; display: table; clear: both; }
        .half-width { width: 48%; display: inline-block; }
        .actions { text-align: right; margin-top: 30px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #007bff; color: white; margin-left: 10px; } /* Blu per Modifica */
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-add { background-color: #28a745; color: white; }
        .event-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .event-table th, .event-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .event-table th { background-color: #f8f9fa; color: #333; }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>Modifica Spettacolo: [Titolo Spettacolo Corrente]</h1>

        <form action="#" method="POST">
            
            <h2>Dati Base e Contenuto</h2>
            <hr>

            <div class="form-group">
                <label for="titolo_spettacolo">Titolo Spettacolo *</label>
                <input type="text" id="titolo_spettacolo" name="titolo_spettacolo" required value="La Traviata - Stagione 2025">
            </div>
            
            <div class="form-row">
                <div class="form-group half-width" style="float: left; margin-right: 4%;">
                    <label for="opera_associata">Opera Associata *</label>
                    <select id="opera_associata" name="opera_associata" required>
                        <option value="traviata" selected>La Traviata</option>
                    </select>
                </div>
                <div class="form-group half-width" style="float: right;">
                    <label for="regia_associata">Regia Associata *</label>
                    <select id="regia_associata" name="regia_associata" required>
                        <option value="regia2024" selected>Produzione Corrente 2024</option>
                    </select>
                </div>
            </div>

            <h3>Politiche di Prezzo Generali</h3>
            <hr>
            
            <div class="form-group"> <label for="tipo_evento">Tipo Evento (Per Logica Prezzo Base) *</label>
                <select id="tipo_evento" name="tipo_evento" required>
                    <option value="standard" selected>Standard</option>
                    <option value="prima">Prima/Gala</option>
                    <option value="ridotta">Recita Ridotta</option>
                </select>
            </div>

            <h2>Lista Eventi (Repliche)</h2>
            <hr>
            
            <button type="button" class="btn btn-add" style="float: right; margin-bottom: 10px;">+ Aggiungi Nuovo Evento</button>

            <table class="event-table">
                <thead>
                    <tr><th>Data e Ora</th><th>Sala</th><th>Stato</th><th>Azioni</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>20/11/2025 - 20:30</td>
                        <td>Sala Grande</td>
                        <td style="color: green; font-weight: bold;">Pubblicato</td>
                        <td><a href="#modifica_evento">Modifica</a> | <a href="#elimina_evento">Elimina</a></td>
                    </tr>
                    <tr>
                        <td>22/11/2025 - 17:00</td>
                        <td>Sala Grande</td>
                        <td style="color: orange; font-weight: bold;">Bozza</td>
                        <td><a href="#modifica_evento">Modifica</a> | <a href="#elimina_evento">Elimina</a></td>
                    </tr>
                </tbody>
            </table>
            
            <div class="actions">
                <button type="button" class="btn btn-danger">Elimina Spettacolo</button> 
                <button type="button" class="btn btn-secondary">Annulla</button> 
                <button type="submit" class="btn btn-primary">Salva Modifiche</button> 
            </div>

        </form>
    </div>

</body>
</html>
