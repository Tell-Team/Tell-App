<html>
  <head>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <button
      onclick="localStorage.removeItem('opera-da-visualizzare'); window.location.href = './info.html';"
    >
      &lt; Indietro
    </button>
    <div id="visualizzata"></div>

    <script>
      const visualizza = JSON.parse(
        localStorage.getItem("opera-da-visualizzare")
      );

      const display = document.getElementById("visualizzata");

      display.innerHTML = "";

      const h2 = document.createElement("h2");
      h2.textContent = `${visualizza.nome}`;
      const p = document.createElement("p");

      const data = new Date(visualizza.data);
      const giorno = data.getDay(data);
      const mese = data.toLocaleString("it-IT", { month: "long" });
      const anno = data.getFullYear();
      const dataFormattata = `${giorno} di ${mese} del ${anno}`;

      p.innerHTML = `Libretto di ${visualizza.librettista}
      <br>Musica di ${visualizza.compositore}
      <br>Prima rappresentazione a ${visualizza.teatro} il ${dataFormattata}.
      <br>
      <br>${visualizza.trama}`;

      display.appendChild(h2);
      display.appendChild(p);
      display.appendChild(document.createElement("br"));
    </script>
  </body>
</html>
