  <body>
    <div class="container">
      <h1>Nuovo account:</h1>

      <form id="formulario-account">
        <h2>Anagrafica</h2>
        <div class="singola-riga">
          <label for="nome">Nome *:</label>
          <input type="text" id="nome" name="nome" required />
        </div>

        <div class="singola-riga">
          <label for="cognome">Cognome *:</label>
          <input type="text" id="cognome" name="cognome" required />
        </div>

        <hr />

        <h2>Accesso e Ruolo</h2>

        <div class="singola-riga">
          <label for="username">Username *: </label>
          <input type="text" id="username" name="username" required />
        </div>

        <div class="singola-riga" style="margin-bottom: 10px">
          <label for="password_new">Password *:</label>
          <input type="password" id="password_new" name="password" required />
        </div>

        <div class="singola-riga">
          <label for="ruolo">Ruolo *: </label>
          <select id="ruolo" name="ruolo" required>
            <option value="">Seleziona un Ruolo</option>
            <option value="amministratore">Amministratore</option>
            <option value="biglietteria">Biglietteria</option>
          </select>
        </div>

        <div class="singola-riga">
          <button type="submit">Conferma</button>
          <button
            type="button"
            onclick="window.location.href='../visualizza/account.html'"
          >
            Cancella
          </button>
        </div>
      </form>
    </div>
  </body>
