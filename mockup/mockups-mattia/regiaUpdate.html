<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Regia - Teatro</title>
    <style>
        /* CSS MINIMALE E COERENTE (come 2A) */
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 20px; }
        .container { max-width: 700px; margin: 0 auto; background-color: #e9f7ff; padding: 30px; border-radius: 8px; border: 2px solid #007bff; }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        h2, h3 { color: #444; margin-top: 25px; margin-bottom: 15px; }
        hr { border: 0; border-top: 1px solid #eee; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .actions { text-align: right; margin-top: 30px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #007bff; color: white; margin-left: 10px; } /* Blu per Modifica */
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-add { background-color: #17a2b8; color: white; padding: 8px 12px; font-size: 0.9em; }
        .role-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .role-table th, .role-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>Modifica Regia: [Nome Regia Corrente]</h1>

        <form action="#" method="POST">
            
            <h2>Dati Base Regia</h2>
            <hr>

            <div class="form-group">
                <label for="nome_regia">Nome Regia *</label>
                <input type="text" id="nome_regia" name="nome_regia" required value="Produzione Corrente 2024">
            </div>
            
            <div class="form-group">
                <label for="regista">Regista *</label>
                <input type="text" id="regista" name="regista" required value="Giulia Bianchi">
            </div>

            <div class="form-group">
                <label for="stagione">Stagione / Anno di Validità *</label>
                <input type="text" id="stagione" name="stagione" required value="2024/2025">
            </div>

            <h2>Dettagli Artistici e Tecnici Flessibili</h2>
            
            <table class="role-table">
                <thead>
                    <tr><th style="width: 40%;">Ruolo (Chiave)</th><th style="width: 50%;">Nominativo (Valore)</th><th style="width: 10%;"></th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" value="Direttore d'Orchestra" style="padding: 5px; height: auto;"></td>
                        <td><input type="text" value="Maestro XYZ" style="padding: 5px; height: auto;"></td>
                        <td style="text-align: center;"><button type="button" class="btn btn-danger" style="padding: 5px;">X</button></td>
                    </tr>
                    <tr>
                        <td><input type="text" value="Costumista" style="padding: 5px; height: auto;"></td>
                        <td><input type="text" value="Marco Rossi" style="padding: 5px; height: auto;"></td>
                        <td style="text-align: center;"><button type="button" class="btn btn-danger" style="padding: 5px;">X</button></td>
                    </tr>
                    <tr>
                        <td><input type="text" placeholder="Es. Scenografo" style="padding: 5px; height: auto;"></td>
                        <td><input type="text" placeholder="Es. Tizio Caio" style="padding: 5px; height: auto;"></td>
                        <td style="text-align: center;"><button type="button" class="btn btn-danger" style="padding: 5px;">X</button></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="btn btn-add" style="margin-top: 10px;">+ Aggiungi Ruolo</button>

            <div class="actions">
                <button type="button" class="btn btn-danger">Elimina Regia</button> 
                <button type="button" class="btn btn-secondary">Annulla</button> 
                <button type="submit" class="btn btn-primary">Salva Modifiche Regia</button> 
            </div>

        </form>
    </div>

</body>
</html>
